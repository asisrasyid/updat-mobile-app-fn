<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catat Transaksi — E-FinMen</title>
  <meta name="theme-color" content="#080D1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/line-awesome.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="assets/sweetalert2/sweetalert2.css" />
</head>
<body>

  <!-- ============================================================
       PRELOADER
       ============================================================ -->
  <div class="preloader" id="preloader">
    <div class="preloader__brand">E-Fin<span>Men</span></div>
    <div class="preloader__ring"></div>
  </div>

  <!-- ============================================================
       LOADING OVERLAY
       ============================================================ -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-overlay__text">Memuat data...</div>
  </div>

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="app-header app-header--light">
    <div class="app-header__left">
      <a href="index.html" class="header-btn header-btn--back">
        <i class="las la-arrow-left"></i>
      </a>
      <div class="app-header__title">Catat Transaksi</div>
    </div>
    <div class="app-header__right">
      <button class="header-btn header-btn--light" id="pembahruandata" title="Refresh data">
        <i class="las la-sync-alt"></i>
      </button>
      <button class="header-btn header-btn--light" id="btnLogout" title="Keluar">
        <i class="las la-power-off"></i>
      </button>
    </div>
  </header>

  <!-- ============================================================
       PAGE CONTENT
       ============================================================ -->
  <div class="page-wrap" style="padding-top:56px; padding-bottom:24px;">
    <div class="container" style="max-width:480px;">

      <!-- Greeting -->
      <div style="padding:16px 0 12px;">
        <div class="text-sm text-muted">Halo,</div>
        <div class="fw-700 text-lg user-name">Pengguna</div>
      </div>

      <!-- Type Segmented Control -->
      <div class="segmented mb-4" id="typeSegmented" style="margin-bottom:16px;">
        <button class="segmented-btn" data-type="Pengeluaran">Pengeluaran</button>
        <button class="segmented-btn" data-type="Pemasukan">Pemasukan</button>
        <button class="segmented-btn" data-type="Perpindahan">Pindah</button>
      </div>

      <!-- Form Card -->
      <div class="card animate-in" id="formCard" style="border-left:4px solid var(--expense);">
        <div class="card-body">
          <form id="dataForm" novalidate autocomplete="off">

            <!-- Hidden inputs (submitted with form) -->
            <input type="hidden" name="paramcek"        value="simpanTransaksi">
            <input type="hidden" id="inputJenis"        name="inputJenis">
            <input type="hidden" id="inputKategori"     name="inputKategori">
            <input type="hidden" id="inputSubkategori"  name="inputSubkategori">
            <input type="hidden" id="inputSumber"       name="inputSumber">
            <input type="hidden" id="inputDataaLain"    name="DataLain">

            <!-- Controlled hidden select for JenisTransaksi -->
            <select id="JenisTransaksi" name="jenisTransaksi" style="display:none;" aria-hidden="true"></select>

            <!-- Kategori -->
            <div class="form-group">
              <label class="label" for="keteranganDropdown">
                <i class="las la-tag"></i> Kategori
              </label>
              <select id="keteranganDropdown" class="select">
                <option value="">Pilih Kategori</option>
              </select>
            </div>

            <!-- Sub Kategori -->
            <div class="form-group">
              <label class="label" for="enumDropdown">
                <i class="las la-list"></i> Sub Kategori
              </label>
              <select id="enumDropdown" class="select">
                <option value="">Pilih Sub Kategori</option>
              </select>
            </div>

            <!-- Sumber Dana (Pemasukan / Pengeluaran) -->
            <div class="form-group" id="dropdownSumberContainer">
              <label class="label" for="bySumber">
                <i class="las la-university"></i> Sumber Dana
              </label>
              <select id="bySumber" class="select">
                <option value="">Pilih Rekening</option>
              </select>
            </div>

            <!-- Rekening Tujuan (Perpindahan) -->
            <div class="form-group" id="inputSumberContainer" style="display:none;">
              <label class="label" for="manualSumberInput">
                <i class="las la-exchange-alt"></i> Rekening Tujuan
              </label>
              <input
                type="text"
                id="manualSumberInput"
                class="input"
                placeholder="Rekening tujuan dipilih otomatis"
                readonly
              >
            </div>

            <!-- Keterangan -->
            <div class="form-group">
              <label class="label" for="keterangan">
                <i class="las la-comment-alt"></i> Keterangan
              </label>
              <input
                type="text"
                id="keterangan"
                name="keterangan"
                class="input"
                placeholder="Deskripsi transaksi (opsional)"
              >
            </div>

            <!-- Jumlah -->
            <div class="form-group">
              <label class="label" for="jumlah">
                <i class="las la-money-bill"></i> Jumlah
              </label>
              <div class="input-rp">
                <input
                  type="number"
                  id="jumlah"
                  name="jumlah"
                  class="input"
                  placeholder="0"
                  min="0"
                  inputmode="numeric"
                  required
                >
              </div>
            </div>

            <!-- Data Pinjaman (hidden, shown when kategori contains hutang/pribadi) -->
            <div id="loanShow" class="form-group" style="display:none;">
              <label class="label" for="loanDropdown">
                <i class="las la-hand-holding-usd"></i> Data Pinjaman
              </label>
              <select id="loanDropdown" class="select" name="loanDropdown">
                <option value="">Pilih Pinjaman</option>
              </select>
            </div>

            <!-- Tanggal Tambahan (hidden, shown when subkategori = Pinjaman Pribadi) -->
            <div id="DataLain" class="form-group" style="display:none;">
              <label class="label" for="DataLainInput">
                <i class="las la-calendar-alt"></i> Tanggal
              </label>
              <input
                type="date"
                id="DataLainInput"
                class="input"
              >
            </div>

            <!-- Submit -->
            <button
              type="submit"
              id="submitButton"
              class="btn btn-primary btn-full btn-lg"
              style="margin-top:8px;"
            >
              <i class="las la-check-circle"></i> Simpan Transaksi
            </button>

          </form>
        </div>
      </div>
      <!-- /Form Card -->

    </div>
  </div>
  <!-- /Page Wrap -->

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="assets/sweetalert2/sweetalert2.js"></script>
  <script src="js/core.js"></script>
  <script src="js/transaksi.js"></script>

</body>
</html>
