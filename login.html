<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — E-FinMen</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080D1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
  <link rel="stylesheet" href="assets/css/line-awesome.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Preloader -->
  <div class="preloader" id="preloader">
    <div class="preloader__brand">E<span>Fin</span>Men</div>
    <div class="preloader__ring"></div>
  </div>

  <!-- Login Page -->
  <div class="login-page">

    <!-- Brand / Logo Area -->
    <div class="login-brand">
      <div class="login-logo">
        <div class="login-logo__icon">
          <i class="las la-chart-line"></i>
        </div>
        <div class="login-logo__name">E-<span>Fin</span>Men</div>
        <div class="login-logo__tagline">Kelola keuanganmu dengan cerdas</div>
      </div>
    </div>

    <!-- Form Area -->
    <div class="login-form-area">
      <h1 class="login-title">Selamat Datang</h1>
      <p class="login-subtitle">Masuk ke akun keuanganmu</p>

      <!-- Error Box -->
      <div id="loginError" style="display:none;" class="form-error">
        <i class="las la-exclamation-circle" style="font-size:18px;flex-shrink:0;"></i>
        <span id="loginErrorText">Email atau password salah.</span>
      </div>

      <form id="loginForm" novalidate>

        <!-- Email Field -->
        <div class="form-group">
          <label class="label" for="usernamedt">
            <i class="las la-envelope"></i> Email
          </label>
          <div class="input-group">
            <i class="las la-envelope input-icon"></i>
            <input
              id="usernamedt"
              type="email"
              class="input"
              placeholder="nama@email.com"
              autocomplete="email"
              inputmode="email"
              required
            >
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="label" for="pasdt">
            <i class="las la-lock"></i> Password
          </label>
          <div class="input-group">
            <i class="las la-lock input-icon"></i>
            <input
              id="pasdt"
              type="password"
              class="input"
              placeholder="Masukkan password"
              autocomplete="current-password"
              required
              style="padding-right: 48px;"
            >
            <button
              type="button"
              class="input-suffix"
              id="togglePass"
              aria-label="Tampilkan password"
              style="background:none;border:none;cursor:pointer;padding:4px;color:var(--text-400);font-size:20px;line-height:1;transition:color 0.2s;"
            >
              <i class="las la-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="btn btn-primary btn-full btn-lg"
          style="margin-top: 8px;"
        >
          <i class="las la-sign-in-alt"></i>
          Masuk
        </button>

      </form>

      <!-- Footer Links -->
      <div style="text-align:center;margin-top:24px;font-size:14px;color:var(--text-400);">
        Belum punya akun?
        <a href="registrasi.html" style="color:var(--indigo-600);font-weight:700;">Daftar</a>
      </div>

      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-400);">
        &copy; 2025 E-FinMen &middot; Finance Management
      </div>

    </div><!-- /.login-form-area -->

  </div><!-- /.login-page -->

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxX0U_DDwXQ9WjTlytdzk1O2ZJk2eu-7nivoCMBAlaZts0mCDvO3u2va-xV60Wi-bak_Q/exec';

    // Redirect jika sudah login
    if (localStorage.getItem('user')) {
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Sembunyikan preloader
      const preloader = document.getElementById('preloader');
      if (preloader) {
        preloader.classList.add('hide');
      }

      const form       = document.getElementById('loginForm');
      const submitBtn  = document.getElementById('submitBtn');
      const errorBox   = document.getElementById('loginError');
      const errorText  = document.getElementById('loginErrorText');
      const togglePass = document.getElementById('togglePass');
      const pasInput   = document.getElementById('pasdt');

      // ── Toggle password visibility ────────────────────────────────
      togglePass.addEventListener('click', function () {
        var isPassword = pasInput.type === 'password';
        pasInput.type  = isPassword ? 'text' : 'password';
        togglePass.querySelector('i').className = isPassword
          ? 'las la-eye-slash'
          : 'las la-eye';
      });

      // ── Helper functions ──────────────────────────────────────────
      function showError(msg) {
        errorText.textContent = msg;
        errorBox.style.display = 'flex';
      }

      function hideError() {
        errorBox.style.display = 'none';
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        if (loading) {
          submitBtn.innerHTML =
            '<span class="spinner spinner--sm" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></span>' +
            ' Memproses...';
        } else {
          submitBtn.innerHTML = '<i class="las la-sign-in-alt"></i> Masuk';
        }
      }

      // ── Clear error on input ──────────────────────────────────────
      ['usernamedt', 'pasdt'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', hideError);
      });

      // ── Form submit ───────────────────────────────────────────────
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        var email    = document.getElementById('usernamedt').value.trim();
        var password = document.getElementById('pasdt').value;

        if (!email || !password) {
          showError('Email dan password wajib diisi.');
          return;
        }

        setLoading(true);

        try {
          var res  = await fetch(
            SCRIPT_URL +
            '?dataset=login' +
            '&usr=' + encodeURIComponent(email) +
            '&psr=' + encodeURIComponent(password)
          );
          var data = await res.json();

          if (data.success) {
            var u = data.data;
            localStorage.setItem('user',  u.nama);
            localStorage.setItem('id',    u.id);
            localStorage.setItem('email', u.email);
            localStorage.setItem('spid',  u.spreedSheetId);
            localStorage.setItem('dt',    JSON.stringify(u));
            window.location.href = 'index.html';
          } else {
            setLoading(false);
            showError(data.message || 'Email atau password salah.');
          }
        } catch (err) {
          setLoading(false);
          showError('Tidak dapat terhubung ke server. Periksa koneksi internet.');
        }
      });
    });

    // ── Service Worker registration ───────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function () {});
    }
  </script>

</body>
</html>
