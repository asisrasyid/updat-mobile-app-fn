<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabungan — E-FinMen</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080D1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
  <link rel="stylesheet" href="assets/css/line-awesome.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="preloader">
  <div class="preloader__brand">E<span>Fin</span>Men</div>
  <div class="preloader__ring"></div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-overlay__text">Memuat data...</div>
</div>

<!-- Header dark -->
<header class="app-header app-header--dark" id="appHeader">
  <div class="app-header__left">
    <div class="app-header__logo">E<span>Fin</span>Men</div>
  </div>
  <div class="app-header__right">
    <button class="header-btn" id="btnRefresh"><i class="las la-sync-alt"></i></button>
    <button class="header-btn" id="btnLogout"><i class="las la-power-off"></i></button>
  </div>
</header>

<!-- Hero — Emerald -->
<div class="hero" style="background:linear-gradient(160deg,#064E3B 0%,#065F46 50%,#0D9488 100%);">
  <div class="hero__inner">
    <div class="hero__greeting">Rencana Tabungan</div>
    <div class="hero__name user-name"></div>
    <div class="hero__balance-label">Total Terkumpul</div>
    <div class="hero__balance" id="totalCollected">Rp —</div>
    <div class="hero-pills">
      <div class="hero-pill" style="flex:1;">
        <div class="hero-pill__icon hero-pill__icon--saving"><i class="las la-bullseye"></i></div>
        <div class="hero-pill__label">Total Target</div>
        <div class="hero-pill__value" id="totalTarget">Rp —</div>
      </div>
      <div class="hero-pill" style="flex:1;">
        <div class="hero-pill__icon hero-pill__icon--income"><i class="las la-layer-group"></i></div>
        <div class="hero-pill__label">Plan Aktif</div>
        <div class="hero-pill__value" id="totalPlans">0</div>
      </div>
    </div>
  </div>
</div>

<!-- Content -->
<div class="content-area">

  <!-- Overall progress -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-body">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span class="text-sm fw-600">Progress Keseluruhan</span>
        <span class="text-sm fw-700 text-indigo" id="overallPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill progress-fill--income" id="overallBar" style="width:0%;"></div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabsEl" style="margin-bottom:16px;">
    <button class="tab-btn active" data-tab="aktif"><i class="las la-spinner"></i> Aktif</button>
    <button class="tab-btn" data-tab="selesai"><i class="las la-check-circle"></i> Selesai</button>
  </div>

  <div class="tab-pane active" id="tab-aktif">
    <div id="listAktif"></div>
  </div>
  <div class="tab-pane" id="tab-selesai">
    <div id="listSelesai"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="app-nav">
  <a href="index.html" class="nav-item"><i class="las la-home"></i><span>Beranda</span></a>
  <a href="riwayat-transaksi.html" class="nav-item"><i class="las la-exchange-alt"></i><span>Riwayat</span></a>
  <a href="Transaksi-save.html" class="nav-item nav-item--fab"><i class="las la-plus"></i></a>
  <a href="plan-saveing.html" class="nav-item active"><i class="las la-piggy-bank"></i><span>Tabungan</span></a>
  <a href="budgeting-view.html" class="nav-item"><i class="las la-wallet"></i><span>Anggaran</span></a>
</nav>

<script src="js/core.js"></script>
<script>
function renderPlanCard(p, i) {
  const target    = Number(p.target_nominal) || 0;
  const pct       = Math.min(Math.max(Number(p.persen_tercapai) || 0, 0), 100);
  const collected = Math.round(target * pct / 100);
  const remaining = target - collected;
  const fillClass = pct >= 100 ? 'progress-fill--income' : pct >= 60 ? 'progress-fill--saving' : 'progress-fill--expense';
  const delay     = Math.min(i + 1, 5);

  return `
    <div class="saving-card animate-in delay-${delay}">
      <div class="saving-card__header">
        <div class="saving-card__title">${Utils.esc(p.judul)}</div>
        <div class="saving-card__pct">${pct.toFixed(0)}%</div>
      </div>
      <div class="progress-track" style="margin-bottom:10px;">
        <div class="progress-fill ${fillClass}" style="width:${pct}%;"></div>
      </div>
      <div class="saving-card__amounts">
        <div class="saving-card__collected"><i class="las la-check-circle"></i> ${Utils.fRp(collected)}</div>
        <div class="saving-card__target">Target ${Utils.fRp(target)}</div>
      </div>
      ${remaining > 0
        ? `<div class="text-xs text-muted" style="margin-top:6px;">Sisa ${Utils.fRp(remaining)}</div>`
        : `<div class="badge badge--success" style="margin-top:8px;display:inline-flex;"><i class="las la-trophy"></i>&nbsp;Tercapai!</div>`}
    </div>`;
}

function renderPlans(plans) {
  let totalTarget = 0, totalCollected = 0;
  plans.forEach(p => {
    const t = Number(p.target_nominal) || 0;
    const c = Math.round(t * (Math.min(Number(p.persen_tercapai)||0,100)) / 100);
    totalTarget += t; totalCollected += c;
  });

  document.getElementById('totalCollected').textContent = Utils.fRp(totalCollected);
  document.getElementById('totalTarget').textContent    = Utils.fRp(totalTarget);
  document.getElementById('totalPlans').textContent     = plans.length;

  const pct = totalTarget > 0 ? Math.min(Math.round(totalCollected/totalTarget*100), 100) : 0;
  document.getElementById('overallPct').textContent  = pct + '%';
  document.getElementById('overallBar').style.width  = pct + '%';

  const aktif   = plans.filter(p => Number(p.persen_tercapai) < 100);
  const selesai = plans.filter(p => Number(p.persen_tercapai) >= 100);

  const elA = document.getElementById('listAktif');
  const elS = document.getElementById('listSelesai');

  elA.innerHTML = aktif.length
    ? aktif.map((p,i) => renderPlanCard(p,i)).join('')
    : `<div class="empty"><div class="empty__icon"><i class="las la-piggy-bank"></i></div><div class="empty__title">Belum ada rencana tabungan aktif</div><div class="empty__desc">Tambah tabungan melalui menu catat transaksi.</div></div>`;

  elS.innerHTML = selesai.length
    ? selesai.map((p,i) => renderPlanCard(p,i)).join('')
    : `<div class="empty"><div class="empty__icon"><i class="las la-trophy"></i></div><div class="empty__title">Belum ada yang selesai</div><div class="empty__desc">Terus semangat menabung!</div></div>`;
}

function showSkeletons() {
  document.getElementById('listAktif').innerHTML = Array(3).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton skeleton-line skeleton-line--lg" style="width:65%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:8px;border-radius:99px;margin-bottom:12px;"></div>
      <div style="display:flex;justify-content:space-between;">
        <div class="skeleton skeleton-line skeleton-line--sm" style="width:38%;"></div>
        <div class="skeleton skeleton-line skeleton-line--sm" style="width:28%;"></div>
      </div>
    </div>`).join('');
}

document.getElementById('tabsEl').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});

document.getElementById('btnRefresh').addEventListener('click', async () => {
  showSkeletons();
  try {
    const data = await API.get(Config.DS.savingPlans);
    const plans = Array.isArray(data) ? data : [];
    localStorage.setItem(Config.KEYS.savingPlans, JSON.stringify(plans));
    renderPlans(plans); Utils.toast('Data diperbarui', 'success');
  } catch(e) { Utils.toast(API.errorMsg(e), 'error'); }
});

window.addEventListener('scroll', () => {
  document.getElementById('appHeader').classList.toggle('scrolled', window.scrollY > 60);
});

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.guard()) return;
  Auth.bindLogout('#btnLogout');
  showSkeletons();
  const cached = localStorage.getItem(Config.KEYS.savingPlans);
  if (cached) { try { renderPlans(JSON.parse(cached)||[]); } catch(e){} }
  try {
    const data = await API.get(Config.DS.savingPlans);
    const plans = Array.isArray(data) ? data : [];
    localStorage.setItem(Config.KEYS.savingPlans, JSON.stringify(plans));
    renderPlans(plans);
  } catch(e) { if (!cached) Utils.toast(API.errorMsg(e), 'error'); }
  Utils.hidePreloader();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
