<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — E-FinMen</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080D1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
  <link rel="stylesheet" href="assets/css/line-awesome.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="preloader">
  <div class="preloader__brand">E<span>Fin</span>Men</div>
  <div class="preloader__ring"></div>
</div>

<div class="login-page">

  <!-- Brand Area -->
  <div class="login-brand">
    <div class="login-logo">
      <div class="login-logo__icon"><i class="las la-user-plus"></i></div>
      <div class="login-logo__name">E<span>Fin</span>Men</div>
      <div class="login-logo__tagline">Buat akun keuanganmu sekarang</div>
    </div>
  </div>

  <!-- Form Area -->
  <div class="login-form-area">
    <div class="login-title">Buat Akun</div>
    <div class="login-subtitle">Daftar gratis, kelola keuangan lebih cerdas</div>

    <!-- Error box -->
    <div class="form-error" id="regError" style="display:none;">
      <i class="las la-exclamation-circle"></i>
      <span id="regErrorText">Terjadi kesalahan.</span>
    </div>

    <form id="regForm" novalidate>
      <!-- Nama -->
      <div class="form-group">
        <label class="label" for="regNama"><i class="las la-user"></i> Nama Lengkap</label>
        <div class="input-group">
          <i class="las la-user input-icon"></i>
          <input type="text" id="regNama" class="input" placeholder="Nama lengkapmu" autocomplete="name" required>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="label" for="regEmail"><i class="las la-envelope"></i> Email</label>
        <div class="input-group">
          <i class="las la-envelope input-icon"></i>
          <input type="email" id="regEmail" class="input" placeholder="nama@email.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="label" for="regPass"><i class="las la-lock"></i> Password</label>
        <div class="input-group">
          <i class="las la-lock input-icon"></i>
          <input type="password" id="regPass" class="input" placeholder="Buat password kuat" autocomplete="new-password" required>
          <button type="button" class="input-suffix" id="togglePass1" style="background:none;border:none;cursor:pointer;color:var(--text-400);font-size:18px;padding:0;">
            <i class="las la-eye"></i>
          </button>
        </div>
      </div>

      <!-- Konfirmasi -->
      <div class="form-group">
        <label class="label" for="regPass2"><i class="las la-lock"></i> Konfirmasi Password</label>
        <div class="input-group">
          <i class="las la-lock input-icon"></i>
          <input type="password" id="regPass2" class="input" placeholder="Ulangi password" autocomplete="new-password" required>
          <button type="button" class="input-suffix" id="togglePass2" style="background:none;border:none;cursor:pointer;color:var(--text-400);font-size:18px;padding:0;">
            <i class="las la-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="regBtn" class="btn btn-primary btn-full btn-lg">
        <i class="las la-user-plus"></i> Daftar Sekarang
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-400);">
      Sudah punya akun? <a href="login.html" style="color:var(--indigo-600);font-weight:700;">Masuk</a>
    </div>

    <div style="text-align:center;margin-top:16px;">
      <small style="color:var(--text-400);">© 2025 E-FinMen · Finance Management</small>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxX0U_DDwXQ9WjTlytdzk1O2ZJk2eu-7nivoCMBAlaZts0mCDvO3u2va-xV60Wi-bak_Q/exec';

if (localStorage.getItem('user')) window.location.href = 'index.html';

document.addEventListener('DOMContentLoaded', () => {
  // Hide preloader
  const pre = document.querySelector('.preloader');
  if (pre) { pre.classList.add('hide'); setTimeout(() => pre.remove(), 450); }

  // Password toggles
  function makeToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener('click', () => {
      const inp = document.getElementById(inputId);
      const isPass = inp.type === 'password';
      inp.type = isPass ? 'text' : 'password';
      document.querySelector(`#${btnId} i`).className = isPass ? 'las la-eye-slash' : 'las la-eye';
    });
  }
  makeToggle('togglePass1', 'regPass');
  makeToggle('togglePass2', 'regPass2');

  const form   = document.getElementById('regForm');
  const btn    = document.getElementById('regBtn');
  const errBox = document.getElementById('regError');
  const errTxt = document.getElementById('regErrorText');

  function showError(msg) {
    errTxt.textContent = msg;
    errBox.style.display = 'flex';
    errBox.style.alignItems = 'center';
    errBox.style.gap = '8px';
  }
  function hideError() { errBox.style.display = 'none'; }

  function setLoading(on) {
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;"></div> Mendaftar...'
      : '<i class="las la-user-plus"></i> Daftar Sekarang';
  }

  ['regNama','regEmail','regPass','regPass2'].forEach(id => {
    document.getElementById(id).addEventListener('input', hideError);
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();

    const nama  = document.getElementById('regNama').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;

    if (!nama || !email || !pass || !pass2) { showError('Semua field wajib diisi.'); return; }
    if (pass !== pass2)                     { showError('Password tidak cocok.'); return; }
    if (pass.length < 6)                    { showError('Password minimal 6 karakter.'); return; }

    setLoading(true);
    try {
      const res  = await fetch(`${SCRIPT_URL}?dataset=register&usr=${encodeURIComponent(email)}&psr=${encodeURIComponent(pass)}&nama=${encodeURIComponent(nama)}`);
      const data = await res.json();
      if (data.success) {
        alert('Pendaftaran berhasil! Silakan login.');
        window.location.href = 'login.html';
      } else {
        setLoading(false);
        showError(data.message || 'Pendaftaran gagal. Coba lagi.');
      }
    } catch(err) {
      setLoading(false);
      showError('Tidak dapat terhubung ke server. Periksa koneksi internet.');
    }
  });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
