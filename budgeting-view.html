<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anggaran — E-FinMen</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080D1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
  <link rel="stylesheet" href="assets/css/line-awesome.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="assets/sweetalert2/sweetalert2.css">
</head>
<body>

<div class="preloader">
  <div class="preloader__brand">E<span>Fin</span>Men</div>
  <div class="preloader__ring"></div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-overlay__text">Memuat data...</div>
</div>

<!-- Header dark -->
<header class="app-header app-header--dark" id="appHeader">
  <div class="app-header__left">
    <div class="app-header__logo">E<span>Fin</span>Men</div>
  </div>
  <div class="app-header__right">
    <button class="header-btn" id="pembahruandata"><i class="las la-sync-alt"></i></button>
    <button class="header-btn" id="LogOutSistem"><i class="las la-power-off"></i></button>
  </div>
</header>

<!-- Hero — Violet/Purple -->
<div class="hero" style="background:linear-gradient(160deg,#2D1B69 0%,#4C1D95 50%,#6D28D9 100%);">
  <div class="hero__inner">
    <div class="hero__greeting">Kelola Anggaran</div>
    <div class="hero__name user-name"></div>
    <div class="hero__balance-label">Sisa Anggaran</div>
    <div class="hero__balance" id="remainingBudget">Rp —</div>
    <div class="hero-pills">
      <div class="hero-pill" style="flex:1;">
        <div class="hero-pill__icon" style="background:rgba(255,255,255,0.12);color:#fff;"><i class="las la-wallet"></i></div>
        <div class="hero-pill__label">Total Anggaran</div>
        <div class="hero-pill__value" id="totalBudget">Rp —</div>
      </div>
      <div class="hero-pill" style="flex:1;">
        <div class="hero-pill__icon" style="background:rgba(255,79,110,0.2);color:#FF4F6E;"><i class="las la-fire"></i></div>
        <div class="hero-pill__label">Terpakai</div>
        <div class="hero-pill__value" id="totalSpent">Rp —</div>
      </div>
    </div>
  </div>
</div>

<!-- Content -->
<div class="content-area">

  <!-- Tabs -->
  <div class="tabs" id="tabsEl" style="margin-bottom:16px;">
    <button class="tab-btn active" data-tab="resume"><i class="las la-chart-pie"></i> Resume</button>
    <button class="tab-btn" data-tab="kategori"><i class="las la-list"></i> Kategori</button>
    <button class="tab-btn" data-tab="riwayat"><i class="las la-history"></i> Riwayat</button>
  </div>

  <!-- Tab: Resume -->
  <div class="tab-pane active" id="tab-resume">
    <div id="budgetCategoriesResume"></div>
  </div>

  <!-- Tab: Kategori -->
  <div class="tab-pane" id="tab-kategori">
    <div id="budgetCategories"></div>
  </div>

  <!-- Tab: Riwayat -->
  <div class="tab-pane" id="tab-riwayat">
    <div style="display:flex;gap:8px;margin-bottom:16px;" id="periodChips">
      <button class="chip active" data-period="week">Minggu Ini</button>
      <button class="chip" data-period="month">Bulan Ini</button>
      <button class="chip" data-period="year">Tahun Ini</button>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="border-bottom:1px solid var(--border);">
              <th style="padding:10px 14px;text-align:left;color:var(--text-400);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Tanggal</th>
              <th style="padding:10px 14px;text-align:left;color:var(--text-400);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Kategori</th>
              <th style="padding:10px 14px;text-align:right;color:var(--text-400);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;">Jumlah</th>
            </tr>
          </thead>
          <tbody id="budgetHistory"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fabAdd"><i class="las la-plus"></i></button>

<!-- Bottom Sheet -->
<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheetAdd">
  <div class="sheet__handle"></div>
  <div class="sheet__title">Tambah Anggaran Baru</div>
  <form id="addCategoryForm">
    <input type="hidden" name="paramcek" value="simpanBudget">
    <div class="form-group">
      <label class="label"><i class="las la-tag"></i> Nama Kategori</label>
      <input type="text" id="categoryName" name="namaBuget" class="input" placeholder="Mis: Makanan, Transportasi" required>
    </div>
    <div class="form-group">
      <label class="label"><i class="las la-money-bill"></i> Jumlah Anggaran</label>
      <div class="input-rp">
        <input type="number" id="categoryBudget" name="nilaibudget" class="input" placeholder="0" min="0" required>
      </div>
    </div>
    <button type="button" id="saveCategoryBtn" class="btn btn-primary btn-full btn-lg">
      <i class="las la-save"></i> Simpan Anggaran
    </button>
    <button type="button" id="cancelBtn" class="btn btn-outline btn-full" style="margin-top:10px;">Batal</button>
  </form>
</div>

<!-- Bottom Nav -->
<nav class="app-nav">
  <a href="index.html" class="nav-item"><i class="las la-home"></i><span>Beranda</span></a>
  <a href="riwayat-transaksi.html" class="nav-item"><i class="las la-exchange-alt"></i><span>Riwayat</span></a>
  <a href="Transaksi-save.html" class="nav-item nav-item--fab"><i class="las la-plus"></i></a>
  <a href="plan-saveing.html" class="nav-item"><i class="las la-piggy-bank"></i><span>Tabungan</span></a>
  <a href="budgeting-view.html" class="nav-item active"><i class="las la-wallet"></i><span>Anggaran</span></a>
</nav>

<script src="assets/sweetalert2/sweetalert2.js"></script>
<script src="js/core.js"></script>
<script>
const BUDGET_URL = Config.getUrl();

function getBudgetClass(pct) {
  if (pct >= 90) return 'budget-card--over';
  if (pct >= 70) return 'budget-card--warn';
  return 'budget-card--ok';
}

function getBudgetFill(pct) {
  if (pct >= 90) return 'progress-fill--expense';
  if (pct >= 70) return 'progress-fill--warning';
  return 'progress-fill--success';
}

function renderBudgetCard(item, i) {
  const budget    = Number(item.budget) || 0;
  const spent     = Number(item.spent)  || 0;
  const remaining = budget - spent;
  const pct       = budget > 0 ? Math.min(Math.round(spent/budget*100), 100) : 0;
  const cls       = getBudgetClass(pct);
  const fill      = getBudgetFill(pct);
  const name      = Utils.esc(item.name || '-');

  return `
    <div class="budget-card ${cls} animate-in delay-${Math.min(i+1,5)}">
      <div class="budget-card__name">${name}</div>
      <div class="budget-card__row">
        <span>Anggaran: <strong>${Utils.fRp(budget)}</strong></span>
        <span class="budget-card__spent">Terpakai: ${Utils.fRp(spent)} (${pct}%)</span>
      </div>
      <div class="progress-track" style="margin:8px 0;">
        <div class="progress-fill ${fill}" style="width:${pct}%;"></div>
      </div>
      <div class="budget-card__row">
        <span class="budget-card__remain">Sisa: ${Utils.fRp(remaining >= 0 ? remaining : 0)}</span>
        ${pct >= 100 ? '<span class="badge badge--danger"><i class="las la-exclamation-triangle"></i> Melebihi</span>' : ''}
      </div>
    </div>`;
}

function loadBudgetData() {
  const data = JSON.parse(localStorage.getItem('budgetData') || '[]');
  let totalBudget = 0, totalSpent = 0;
  let html = '';

  data.forEach((item, i) => {
    totalBudget += Number(item.budget) || 0;
    totalSpent  += Number(item.spent)  || 0;
    html += renderBudgetCard(item, i);
  });

  if (!html) {
    html = `<div class="empty"><div class="empty__icon"><i class="las la-wallet"></i></div><div class="empty__title">Belum ada anggaran</div><div class="empty__desc">Tambah kategori anggaran untuk mulai melacak pengeluaran.</div></div>`;
  }

  document.getElementById('budgetCategoriesResume').innerHTML = html;
  document.getElementById('budgetCategories').innerHTML = html;
  document.getElementById('totalBudget').textContent    = Utils.fRp(totalBudget);
  document.getElementById('totalSpent').textContent     = Utils.fRp(totalSpent);
  document.getElementById('remainingBudget').textContent = Utils.fRp(Math.max(totalBudget - totalSpent, 0));
}

function loadBudgetHistory(period = 'week') {
  const historyData = JSON.parse(localStorage.getItem('budgetHistory') || '[]');
  const tbody = document.getElementById('budgetHistory');
  const now = new Date();

  const filtered = historyData.filter(item => {
    const d = new Date(item.date);
    const days = Math.ceil(Math.abs(now - d) / 86400000);
    if (period === 'week')  return days <= 7;
    if (period === 'month') return days <= 30;
    if (period === 'year')  return days <= 365;
    return true;
  });

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:32px 16px;color:var(--text-400);font-size:13px;"><i class="las la-history" style="font-size:24px;display:block;margin-bottom:8px;"></i>Tidak ada riwayat untuk periode ini.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(item => `
    <tr style="border-bottom:1px solid var(--border);">
      <td style="padding:10px 14px;color:var(--text-600);">${Utils.esc(item.date ? new Date(item.date).toLocaleDateString('id-ID') : '-')}</td>
      <td style="padding:10px 14px;font-weight:600;color:var(--text-900);">${Utils.esc(item.category||'-')}</td>
      <td style="padding:10px 14px;text-align:right;font-weight:700;color:var(--expense);">${Utils.fRp(item.amount)}</td>
    </tr>`).join('');
}

async function fetchBudgetData() {
  try {
    const res  = await fetch(`${BUDGET_URL}&dataset=data-budget`);
    const data = await res.json();
    if (data && data.values) localStorage.setItem('budgetData', JSON.stringify(data.values));
    else if (Array.isArray(data)) localStorage.setItem('budgetData', JSON.stringify(data));
  } catch(e) { console.warn('Budget fetch failed', e); }
  loadBudgetData();
}

// Tabs
document.getElementById('tabsEl').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});

// Period chips (riwayat)
document.getElementById('periodChips').addEventListener('click', e => {
  const btn = e.target.closest('.chip'); if (!btn) return;
  document.querySelectorAll('#periodChips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  loadBudgetHistory(btn.dataset.period);
});

// Open/close sheet
['fabAdd'].forEach(id => document.getElementById(id).addEventListener('click', () => Utils.openSheet('sheetAdd')));
document.getElementById('cancelBtn').addEventListener('click', () => Utils.closeSheet('sheetAdd'));
document.getElementById('backdrop').addEventListener('click', () => Utils.closeSheet('sheetAdd'));

// Save budget
document.getElementById('saveCategoryBtn').addEventListener('click', async () => {
  const form    = document.getElementById('addCategoryForm');
  const nameVal = document.getElementById('categoryName').value.trim();
  const budgVal = document.getElementById('categoryBudget').value.trim();
  const btn     = document.getElementById('saveCategoryBtn');

  if (!nameVal || !budgVal) {
    Swal.fire({ icon:'warning', title:'Data Kurang', text:'Isi nama kategori dan jumlah anggaran.', confirmButtonText:'OK' });
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner spinner--sm" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;"></div> Menyimpan...';

  try {
    const formData = new FormData(form);
    const res = await API.post(formData);
    if (res.success) {
      Utils.closeSheet('sheetAdd');
      form.reset();
      Swal.fire({ icon:'success', title:'Tersimpan!', text:res.message||'Anggaran berhasil ditambahkan.', confirmButtonText:'Sip!', timer:2000 })
        .then(() => fetchBudgetData());
    } else {
      Utils.closeSheet('sheetAdd');
      Swal.fire({ icon:'warning', title:'Ups!', text:res.message||'Terjadi kesalahan.', confirmButtonText:'OK' });
    }
  } catch(e) {
    Swal.fire({ icon:'error', title:'Koneksi Error', text:'Periksa koneksi internet.', confirmButtonText:'OK' });
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="las la-save"></i> Simpan Anggaran';
  }
});

document.getElementById('pembahruandata').addEventListener('click', () => { Utils.setLoading(true); fetchBudgetData().then(() => { Utils.setLoading(false); Utils.toast('Data diperbarui', 'success'); }); });

window.addEventListener('scroll', () => { document.getElementById('appHeader').classList.toggle('scrolled', window.scrollY > 60); });

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.guard()) return;
  Auth.bindLogout('#LogOutSistem');
  await fetchBudgetData();
  loadBudgetHistory();
  Utils.hidePreloader();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
