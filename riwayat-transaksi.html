<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Transaksi — E-FinMen</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080D1A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
  <link rel="stylesheet" href="assets/css/line-awesome.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="preloader">
  <div class="preloader__brand">E<span>Fin</span>Men</div>
  <div class="preloader__ring"></div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-overlay__text">Memuat data...</div>
</div>

<header class="app-header app-header--light">
  <div class="app-header__left">
    <div class="app-header__title">Riwayat Transaksi</div>
  </div>
  <div class="app-header__right">
    <button class="header-btn header-btn--light" id="btnRefresh"><i class="las la-sync-alt"></i></button>
    <button class="header-btn header-btn--light" id="btnLogout"><i class="las la-power-off"></i></button>
  </div>
</header>

<div class="page-wrap">
<div class="container">

  <div style="padding:12px 0 4px;">
    <div class="filter-chips" id="filterChips">
      <button class="chip active" data-filter="semua">Semua</button>
      <button class="chip" data-filter="Pemasukan">Pemasukan</button>
      <button class="chip" data-filter="Pengeluaran">Pengeluaran</button>
      <button class="chip" data-filter="Perpindahan">Perpindahan</button>
    </div>
  </div>

  <div style="margin-bottom:16px;">
    <select class="select" id="periodFilter">
      <option value="all">Semua Periode</option>
      <option value="today">Hari Ini</option>
      <option value="week">Minggu Ini</option>
      <option value="month" selected>Bulan Ini</option>
      <option value="year">Tahun Ini</option>
    </select>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="card-body" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;">
      <div style="text-align:center;">
        <div class="text-xs text-muted">Pemasukan</div>
        <div class="fw-700 text-sm text-income" id="sumPemasukan">Rp 0</div>
      </div>
      <div style="width:1px;height:28px;background:var(--border);"></div>
      <div style="text-align:center;">
        <div class="text-xs text-muted">Pengeluaran</div>
        <div class="fw-700 text-sm text-expense" id="sumPengeluaran">Rp 0</div>
      </div>
      <div style="width:1px;height:28px;background:var(--border);"></div>
      <div style="text-align:center;">
        <div class="text-xs text-muted">Selisih</div>
        <div class="fw-700 text-sm" id="sumSelisih">Rp 0</div>
      </div>
    </div>
  </div>

  <div id="transactionList"></div>

</div>
</div>

<a href="Transaksi-save.html" class="fab"><i class="las la-plus"></i></a>

<nav class="app-nav">
  <a href="index.html" class="nav-item"><i class="las la-home"></i><span>Beranda</span></a>
  <a href="riwayat-transaksi.html" class="nav-item active"><i class="las la-exchange-alt"></i><span>Riwayat</span></a>
  <a href="Transaksi-save.html" class="nav-item nav-item--fab"><i class="las la-plus"></i></a>
  <a href="plan-saveing.html" class="nav-item"><i class="las la-piggy-bank"></i><span>Tabungan</span></a>
  <a href="budgeting-view.html" class="nav-item"><i class="las la-wallet"></i><span>Anggaran</span></a>
</nav>

<script src="js/core.js"></script>
<script>
let allTransactions = [];
let currentFilter = 'semua';
let currentPeriod = 'month';

function filterByPeriod(data, period) {
  const now = new Date();
  return data.filter(t => {
    const d = new Date(t.tanggal);
    if (period === 'today') return d.toDateString() === now.toDateString();
    if (period === 'week')  { const s = new Date(now); s.setDate(now.getDate()-7); return d >= s; }
    if (period === 'month') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    if (period === 'year')  return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function renderList() {
  let data = filterByPeriod(allTransactions, currentPeriod);
  if (currentFilter !== 'semua') data = data.filter(t => t.jenis === currentFilter);

  const s = Utils.calcSummary(data);
  document.getElementById('sumPemasukan').textContent   = Utils.fRp(s.pemasukan);
  document.getElementById('sumPengeluaran').textContent = Utils.fRp(s.pengeluaran);
  const sel = s.pemasukan - s.pengeluaran;
  const selEl = document.getElementById('sumSelisih');
  selEl.textContent  = Utils.fRp(Math.abs(sel));
  selEl.style.color  = sel >= 0 ? 'var(--income)' : 'var(--expense)';

  const container = document.getElementById('transactionList');

  if (!data.length) {
    container.innerHTML = `<div class="empty"><div class="empty__icon"><i class="las la-receipt"></i></div><div class="empty__title">Tidak ada transaksi</div><div class="empty__desc">Coba ubah filter atau periode.</div></div>`;
    return;
  }

  const groups = Utils.groupByDate(data);
  let html = '';
  Object.entries(groups).forEach(([date, items]) => {
    html += `<div class="trx-date">${date}</div>`;
    items.forEach(t => {
      const cls  = Utils.getTrxClass(t.jenis, t.kategori);
      const icon = Utils.getCategoryIcon(t.kategori);
      const sign = t.jenis === 'Pemasukan' ? '+' : (t.jenis === 'Perpindahan' ? '↔' : '-');
      html += `
        <div class="trx-item">
          <div class="trx-item__icon trx-item__icon--${cls}"><i class="las ${icon}"></i></div>
          <div class="trx-item__info">
            <div class="trx-item__title">${Utils.esc(t.keterangan || t.kategori || '-')}</div>
            <div class="trx-item__sub">${Utils.esc(t.kategori||'')}${t.subKategori?' / '+Utils.esc(t.subKategori):''}</div>
          </div>
          <div>
            <div class="trx-item__amount trx-item__amount--${cls}">${sign} ${Utils.fRp(t.jumlah)}</div>
            <div class="trx-item__time">${Utils.fTime(t.tanggal)}</div>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
}

function showSkeletons() {
  document.getElementById('transactionList').innerHTML = Array(5).fill(0).map(() => `
    <div class="skeleton-card"><div style="display:flex;gap:12px;align-items:center;">
      <div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
      <div style="flex:1;"><div class="skeleton skeleton-line" style="width:60%;"></div><div class="skeleton skeleton-line skeleton-line--sm" style="width:40%;"></div></div>
      <div><div class="skeleton skeleton-line" style="width:56px;"></div></div>
    </div></div>`).join('');
}

document.getElementById('filterChips').addEventListener('click', e => {
  const btn = e.target.closest('.chip'); if (!btn) return;
  document.querySelectorAll('#filterChips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderList();
});

document.getElementById('periodFilter').addEventListener('change', e => {
  currentPeriod = e.target.value; renderList();
});

document.getElementById('btnRefresh').addEventListener('click', async () => {
  showSkeletons();
  try {
    const data = await API.get(Config.DS.transactions);
    allTransactions = Array.isArray(data) ? data : [];
    localStorage.setItem(Config.KEYS.transactions, JSON.stringify(allTransactions));
    renderList(); Utils.toast('Data diperbarui', 'success');
  } catch(e) { Utils.toast(API.errorMsg(e), 'error'); }
});

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.guard()) return;
  Auth.bindLogout('#btnLogout');
  showSkeletons();
  const cached = localStorage.getItem(Config.KEYS.transactions);
  if (cached) { try { allTransactions = JSON.parse(cached)||[]; renderList(); } catch(e){} }
  try {
    const data = await API.get(Config.DS.transactions);
    allTransactions = Array.isArray(data) ? data : [];
    localStorage.setItem(Config.KEYS.transactions, JSON.stringify(allTransactions));
    renderList();
  } catch(e) { if (!cached) Utils.toast(API.errorMsg(e), 'error'); }
  Utils.hidePreloader();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
